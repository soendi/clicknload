name: Build Setup

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --uac-admin --name "ClickNLoadBridge" --version-file version_info.txt --icon icon.ico --hidden-import myjd --hidden-import main --hidden-import dlc --hidden-import gui --hidden-import pythoncom --hidden-import win32com.client --hidden-import win32com --collect-all pywin32 run.py --distpath dist

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Setup
        run: iscc Installer\setup.iss

      - name: Create Release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $api = "https://api.github.com/repos/soendi/clicknload/releases"
          $body = '{"tag_name":"' + $tag + '","name":"' + $tag + '","body":"Automatischer Build"}'
          Write-Host "Create release $tag ..."
          $rel = curl.exe -sS -X POST $api -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $env:GITHUB_TOKEN" -d $body
          Write-Host "Response: $rel"
          try { $id = ($rel | ConvertFrom-Json).id } catch { $id = $null }
          if (-not $id) {
            Write-Host "Release existiert – suche ID ..."
            $rels = curl.exe -sS "$api?per_page=10" -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $env:GITHUB_TOKEN"
            $id = ($rels | ConvertFrom-Json | Where-Object { $_.tag_name -eq $tag } | Select-Object -First 1).id
          }
          if (-not $id) { throw "Release ID not found" }
          Write-Host "Release ID: $id, upload asset ..."
          curl.exe -sS -X POST "https://uploads.github.com/repos/soendi/clicknload/releases/$id/assets?name=ClickNLoadBridge_Setup.exe" -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $env:GITHUB_TOKEN" -H "Content-Type: application/octet-stream" --data-binary "@dist/ClickNLoadBridge_Setup.exe"
          Write-Host "Done"