name: Build MSI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --uac-admin --name "ClickNLoadBridge" --version-file version_info.txt --icon icon.ico --hidden-import myjd --hidden-import main --hidden-import dlc --hidden-import gui --hidden-import pythoncom --hidden-import win32com.client --hidden-import win32com --collect-all pywin32 run.py --distpath dist

      - name: Install WiX
        run: dotnet tool install --global wix --version 4.0.5 2>$null

      - name: Build MSI
        run: wix build Installer/Product.wxs -o dist/ClickNLoadBridge_Setup.msi -arch x64 -bindpath "dist;."

      - name: Create Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          Write-Host "Creating release for $tag ..."
          $body = @{tag_name=$tag; name=$tag; body="Automatischer Build"} | ConvertTo-Json -Compress
          $api = "https://api.github.com/repos/soendi/clicknload/releases"
          $headers = @{Accept="application/vnd.github+json"; Authorization="Bearer $env:GH_TOKEN"}
          $rel = curl.exe -s -X POST $api -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $env:GH_TOKEN" -d $body 2>$null
          $id = ($rel | ConvertFrom-Json).id
          if (-not $id) {
            Write-Host "Release existiert bereits – suche ID ..."
            $rels = curl.exe -s $api -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $env:GH_TOKEN" 2>$null
            $id = ($rels | ConvertFrom-Json | Where-Object { $_.tag_name -eq $tag } | Select-Object -First 1).id
          }
          Write-Host "Release ID: $id"
          curl.exe -s -X POST "https://uploads.github.com/repos/soendi/clicknload/releases/$id/assets?name=ClickNLoadBridge_Setup.msi" -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $env:GH_TOKEN" -H "Content-Type: application/octet-stream" --data-binary "@dist/ClickNLoadBridge_Setup.msi" 2>$null
          Write-Host "MSI uploaded"
