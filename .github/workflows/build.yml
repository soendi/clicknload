name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --uac-admin --name "ClickNLoadBridge" --version-file version_info.txt --icon icon.ico --hidden-import myjd --hidden-import main --hidden-import dlc --hidden-import pythoncom --hidden-import win32com.client --hidden-import win32com --collect-all pywin32 run.py --distpath dist

      - name: Setup WiX
        run: |
          dotnet tool install --global wix --version 4.0.5 2>$null
          wix extension add WixToolset.UI.wixext 2>$null

      - name: Build MSI
        run: wix build Installer\Product.wxs -o dist\ClickNLoadBridge_Setup.msi -arch x64 -bindpath "dist\;."

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} dist\ClickNLoadBridge.exe dist\ClickNLoadBridge_Setup.msi --title "${{ github.ref_name }}" --notes "Automatischer Build" 2>$null || gh release upload ${{ github.ref_name }} dist\ClickNLoadBridge.exe dist\ClickNLoadBridge_Setup.msi --clobber
